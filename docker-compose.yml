services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    command: php -S 0.0.0.0:8000 -t backend/public
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_DRIVER: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: feactiva_iglesia_saas
      DB_USER: feactiva
      DB_PASS: feactiva
      DB_CHARSET: utf8mb4
      DB_COLLATION: utf8mb4_unicode_ci
      SESSION_SECURE: "false"
      STORAGE_PATH: storage
      LOG_PATH: logs
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9090:80"
    depends_on:
      - api

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: feactiva_iglesia_saas
      MARIADB_USER: feactiva
      MARIADB_PASSWORD: feactiva
    ports:
      - "3307:3306"
    volumes:
      - feactiva_db_data:/var/lib/mysql
      - ./database:/schema:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  feactiva_db_data:
